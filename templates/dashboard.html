<!DOCTYPE html>

<html>

<head>

<link
rel="stylesheet"
href="/static/style.css">

</head>

<body>

<div class="container">

<div class="top">

<h1>

Splitwise Clone

</h1>

<div class="welcome">

Hello

</div>

</div>



<div class="grid">



<div class="card">

<h2>

Friends

</h2>

{% for friend in friends %}

<div class="friend">

👤 {{friend[0]}}

</div>

{% endfor %}

</div>





<div class="card">

<h2>

Quick Expense

</h2>

<form
action="/add_expense"
method="POST">

<input
name="description"
placeholder="Description"
required>

<br><br>

<input
name="amount"
type="number"
placeholder="Amount"
required>

<br><br>

<select
name="friend_email">

{% for friend in friends %}

<option
value="{{friend[0]}}">

{{friend[0]}}

</option>

{% endfor %}

</select>

<br><br>

<select
name="split_type">

<option
value="equal">

Split Equally

</option>

<option
value="full">

Friend Owes Full Amount

</option>

</select>

<br><br>

<button>

Add Expense

</button>

</form>

</div>



</div>





<div class="card">

<h2>

Add Friend

</h2>

<form
action="/add_friend"
method="POST">

<input
name="email"
placeholder="Friend Email"
required>

<br><br>

<button>

Add

</button>

</form>

</div>





<div class="card">

<a href="/balances">

View Balances →

</a>

</div>



</div>

</body>

</html>
